name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────
  # Pipeline 1: TESTS (lint + unit tests)
  # ─────────────────────────────────────────────
  tests:
    name: Tests (lint + unit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm + yarn)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          corepack prepare yarn@4.13.0 --activate

      # ---- backend ----
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Backend — install
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Backend — prisma generate
        working-directory: ./backend
        run: pnpm exec prisma generate

      - name: Backend — lint
        working-directory: ./backend
        run: pnpm run lint

      - name: Backend — unit tests
        working-directory: ./backend
        run: pnpm test

      # ---- frontend ----
      - name: Cache yarn (Berry) cache
        uses: actions/cache@v4
        with:
          path: frontend/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Frontend — install
        working-directory: ./frontend
        run: yarn install --immutable

      - name: Frontend — lint
        working-directory: ./frontend
        run: yarn lint

      - name: Frontend — unit tests
        working-directory: ./frontend
        run: yarn test

  # ─────────────────────────────────────────────
  # Pipeline 2: BUILD (apps + docker images)
  # ─────────────────────────────────────────────
  build:
    name: Build (apps + docker)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm + yarn)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          corepack prepare yarn@4.13.0 --activate

      # ---- backend build ----
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Backend — install
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Backend — prisma generate
        working-directory: ./backend
        run: pnpm exec prisma generate

      - name: Backend — build
        working-directory: ./backend
        run: pnpm run build

      # ---- frontend build ----
      - name: Cache yarn (Berry) cache
        uses: actions/cache@v4
        with:
          path: frontend/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Frontend — install
        working-directory: ./frontend
        run: yarn install --immutable

      - name: Frontend — build
        working-directory: ./frontend
        run: yarn build

      # ---- docker images ----
      - uses: docker/setup-buildx-action@v3

      - name: Docker — build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

      - name: Docker — build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
