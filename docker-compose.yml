services:
  api:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/nestdb
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm run dev"

  web:
    build: ./frontend
    ports:
      - "3030:3030"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/webpack.config.js:/app/webpack.config.js
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nestdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nestdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
